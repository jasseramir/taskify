<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles/style.css"/>
  <title>Task Tracker</title>
</head>
<body>
  <main class="container">
    <h1 class="title">Taskify</h1>
    <section class="task-input-container">
      <input type="text" class="task-input" id="taskInput" placeholder="Enter your task here">
      <button class="task-btn" id="taskBtn">Enter</button>
    </section>
    
    <section class="output" id="output"></section>
  </main>
  
  <div class="modal-container" id="modalBox">
    <div class="modal-box">
      <h2 class="modal-title">Confirm Message</h2>
      <p>Are you sure that you want to delete this task?</p>
      <div class="modal-btns-container">
        <button class="modal-cancel modal-btn" id="modalCancel">Cancel</button>
        <button class="modal-confirm modal-btn" id="modalConfirm">Delete</button>        
      </div>
    </div>
  </div>
  
  <script src="scripts/script.js"></script>
</body>
</html>
